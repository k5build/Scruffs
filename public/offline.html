<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Scruffs – No Connection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F4F2EE;
      color: #1C2421;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      padding-top: env(safe-area-inset-top, 20px);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    .icon {
      width: 96px; height: 96px;
      background: #3A4F4A;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
    }
    .icon img { width: 64px; height: 64px; border-radius: 12px; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; color: #1C2421; }
    p  { font-size: 0.9rem; color: #726E69; line-height: 1.6; max-width: 280px; }
    .badge {
      margin-top: 0.5rem;
      display: inline-block;
      background: #E8E2D9;
      color: #3A4F4A;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 999px;
    }
    button {
      margin-top: 2rem;
      background: #3A4F4A;
      color: #F4F2EE;
      border: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
    }
    button:active { opacity: 0.85; }
    .divider {
      width: 40px; height: 2px;
      background: #DDD7CC;
      border-radius: 2px;
      margin: 1.5rem auto 1rem;
    }
    .tip { font-size: 0.78rem; color: #AAA7A2; }
  </style>
</head>
<body>
  <div class="icon">
    <img src="/logo-icon-beige.png" alt="Scruffs" onerror="this.style.display='none'" />
  </div>

  <h1>No Connection</h1>
  <p>Please check your internet connection and try again.</p>
  <span class="badge">You're offline</span>

  <button onclick="window.location.reload()">Try Again</button>

  <div class="divider"></div>
  <p class="tip">Your previously viewed pages are available offline.</p>

  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
